name: Full Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Push schema to test DB
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
        run: npx prisma db push

      - name: Run API + DB tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/postgres
          MOCK_AI: 'true'
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
        run: npm run test:api && npm run test:db

  k6:
    runs-on: ubuntu-latest
    needs: vitest

    steps:
      - uses: actions/checkout@v4

      - uses: grafana/setup-k6-action@v1

      - name: Start app
        run: |
          npm ci
          npm run build
          npm start &
          npx wait-on http://localhost:3000/api/health --timeout 60000

      - name: Run load tests
        env:
          BASE_URL: http://localhost:3000
          TEST_AUTH_TOKEN: ${{ secrets.TEST_AUTH_TOKEN }}
        run: npm run test:load
